name: CI/CD Pipeline

on:
  push:
    branches: [ "*" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('src/install.sh', 'test/install.sh') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('src/install.sh') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended
        ./src/install.sh
        ./test/install.sh
        python3 -m playwright install --with-deps chromium

    - name: Run tests
      env:
        PYTHONPATH: .
      run: |
        python3 -m pytest

    - name: Generate artifacts
      env:
        PYTHONPATH: .
      run: |
        python3 src/renderer.py
        python3 src/assembler.py

    - name: Compile LaTeX to PDF
      run: |
        pdflatex -interaction=nonstopmode report.tex
        pdflatex -interaction=nonstopmode report.tex
        pdflatex -interaction=nonstopmode bericht.tex
        pdflatex -interaction=nonstopmode bericht.tex

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          report.pdf
          REPORT.md
          bericht.pdf
          BERICHT.md
          output/images/cortisol_animation.gif
          output/images/cortisone_animation.gif
